<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404</title>
  <link rel="icon" href="/assets/favicon.ico">
<style>
body {
background-color: black;
color: white;
}
a {
color: white;
}
.btn {
          /* Меняем цвет фона, чтобы выделить кнопку */
  background-color: #4CAF50;
  /* Убираем границы блока */
  border: none;
  /* Меняем цвет текста */
  color: white;
  /* Добавляем отступы внутри */
  padding: 15px 32px;
  /* Центрируем текст по центру */
  text-align: center;
  /* Убираем нижнюю черту у тега a */
  text-decoration: none;
  /* Меняем тип на inline-block, чтобы кнопка занимала только столько места, сколько требуется */
  display: inline-block;
  /* Устанавливаем размер текста */
  font-size: 16px;
  /* При наведении курсора на блок будет меняться тип курсора */
  cursor: pointer;
}
</style>
</head>
<body>
<center>
<img src="/images/CraftBipedMinecraft.png" width="60" height="60"><br><br>
<img src="./images/404.jpeg" style="border: 3px solid white;" width="300" height: auto;></img>
</center>
<h1>Новый мем? Или всё таки страница 404?</h1>
<p>404 - страница не найдена!</p>
<p><i>Проверьте правильность URL или перейдите на главную.</i></p>
<center>

</center>
</body>
</html>
