<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Создание статьи в CraftBiped Wiki!</title>
<style>
body {
font-family: 'Arial';
background-color: black;
color: white;
}
</style>
</head>
<body>
<center>
<h1>Создание статьи в CraftBiped Вики!</h1>
<input type="text" id="create" placeholder="Название статьи">
<button type="button" onclick="createpage()">Создать страницу!</button>
<br><br><br>
<button type="button" onclick="window.location.href = \"https://craftbiped.fandom.com\"">Отмена</button>
</center>
<script>
function createpage(){
var get = document.getElementById('create');
var article = get.value;
var redirect = "https://craftbiped.fandom.com/ru/wiki/"+ article +"?action=edit";
if (redirect === "https://craftbiped.fandom.com/ru/wiki/?action=edit"){
alert("Пожалуйста, введите название статьи!")
} else {
window.location.href = redirect;
}
}
</script>
</body>
</html>
