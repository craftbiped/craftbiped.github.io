<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Maintenance</title>
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
background-color: black;
color: white;
font-family: 'Arial';
}
.btn {
          /* Меняем цвет фона, чтобы выделить кнопку */
  background-color: #4CAF50;
  /* Убираем границы блока */
  border: none;
  /* Меняем цвет текста */
  color: white;
  /* Добавляем отступы внутри */
  padding: 15px 32px;
  /* Центрируем текст по центру */
  text-align: center;
  /* Убираем нижнюю черту у тега a */
  text-decoration: none;
  /* Меняем тип на inline-block, чтобы кнопка занимала только столько места, сколько требуется */
  display: inline-block;
  /* Устанавливаем размер текста */
  font-size: 16px;
  /* При наведении курсора на блок будет меняться тип курсора */
  cursor: pointer;
}
</style>
</head>
<body>
<center><a href="/" class="btn "style="color:white"><b><-- ВЕРНУТЬСЯ ОБРАТНО</b></a></center>

<center>

<br>
<h1>Сейчас на сайте проходят тех.работы!!</h1>
<h3 id="nftext">Мы скоро откроемся!</h3>
</center>
</body>
</html>
