<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow"/>
<meta http-equiv="Cache-Control" content="no-cache">
<link rel="stylesheet" type="text/css" href="https://craftbiped.github.io/styles.css" />
<script src="https://craftbiped.github.io/jquery.js"></script>
<script>
mobilemode = true;
</script>
<style>
#ifr {
    position: absolute;
    top: 20%;
    left: 0;
    border: 0;
    height: 80%;

    width: 100%; /*абы какое*/
    background-color: black;
}
</style>
<style>
.modal {
    position: fixed; /* фиксированное положение */
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    z-index: 1050;
    background-color: #00a89b;
    opacity: 0; /* по умолчанию модальное окно прозрачно */
    -webkit-transition: opacity 200ms ease-in; 
    -moz-transition: opacity 200ms ease-in;
    transition: opacity 200ms ease-in; /* анимация перехода */
    pointer-events: none; /* элемент невидим для событий мыши */
    margin: 0;
    padding: 0;
}
/* При отображении модального окно */
.modal:target {
    opacity: 1; /* делаем окно видимым */
   pointer-events: auto; /* элемент видим для событий мыши */
    overflow-y: auto; /* добавляем прокрутку по y, когда элемент не помещается на страницу */
}
/* ширина модального окна и его отступы от экрана */
.modal-dialog {
    position: relative;
    width: 100%;
}
@media (min-width: 576px) {
  .modal-dialog {

  }
}
/* Стили для блока с контентом окна */ 
.modal-content {
    position: relative;
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    -ms-flex-direction: column;
    flex-direction: column;
    background-color: #fff;
    -webkit-background-clip: padding-box;
    background-clip: padding-box;
    border: 1px solid rgba(0,0,0,.2);
    border-radius: .3rem;
    outline: 0;
}
@media (min-width: 768px) {
  .modal-content {
      -webkit-box-shadow: 0 5px 15px rgba(0,0,0,.5);
      box-shadow: 0 5px 15px rgba(0,0,0,.5);
  }
}
/* Стили заголовка окна */
.modal-header {
    display: -webkit-box;
    display: -webkit-flex;
    display: -ms-flexbox;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-box-pack: justify;
    -webkit-justify-content: space-between;
    -ms-flex-pack: justify;
    justify-content: space-between;
    padding: 15px;
    border-bottom: 1px solid #eceeef;
}
.modal-title {
    margin-top: 0;
    margin-bottom: 0;
    line-height: 1.5;
    font-size: 1.25rem;
    font-weight: 500;
    color: black;
}
/* Стили кнопки "х" ("Закрыть")  */
.close {
    float: right;
    font-family: sans-serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    color: #000;
    text-shadow: 0 1px 0 #fff;
    opacity: .5;
    text-decoration: none;
    color: red;
}
/* Стили для закрывающей кнопки в фокусе или наведении */
.close:focus, .close:hover {
    color: #000;
    text-decoration: none;
    cursor: pointer;
    opacity: .75;
}
/* Стили блока основного содержимого окна */
.modal-body {
  position: relative;
    -webkit-box-flex: 1;
    -webkit-flex: 1 1 auto;
    -ms-flex: 1 1 auto;
    flex: 1 1 auto;
    overflow: auto;

}
</style>
</head>
<body style="color: white;">
<div style="text-align: center;">
<br>
<img src="https://craftbiped.github.io/images/CraftBipedMinecraft.png" width="30" height="30"><br>
<button onclick="openMenu();"">≡ МЕНЮ</button>
</div>
<br>
<div id="frm">
<iframe id="ifr" src="https://craftbiped.github.io"></iframe>
</div>
<div id="menu" class="modal">  <div class="modal-dialog">    <div class="modal-content">      <div class="modal-header">        <h3 class="modal-title">Меню приложения</h3>        <a href="#" title="Закрыть" class="close">×</a>      </div>      <div class="modal-body">     
<center><br><button onclick="loadIframeURL('https://craftbiped.github.io/')">Главная</button> <button onclick="loadIframeURL('https://craftbiped.github.io/infoapp')">Информация о сервере</button> <button onclick="loadIframeURL('https://craftbiped.github.io/blog/')">Официальный блог CraftBiped</button> <button onclick="loadIframeURL('https://craftbiped.github.io/blog/news')">Новости сервера</button> <button onclick="loadIframeURL('https://craftbiped.github.io/rules')">Правила сервера</button> <button onclick="loadIframeURL('https://craftbiped.github.io/updates')">Список всех обновлений</button> <button onclick="loadIframeURL('https://craftbiped.github.io/expectations/')">Отсчёты до ожидаемых событий</button> <button onclick="loadIframeURL('https://craftbiped.github.io/videos/')">Видео сервера CraftBiped</button> <button onclick="loadIframeURL('https://craftbiped.github.io/dsinapp')">Наш дискорд сервер</button> <br><br></center></div>     </div>    </div>  </div></div>
<script>
function openMenu() {
window.location.hash = "#menu";
}
</script>
<script>
function loadIframeURL(url){
window.location.hash = "#";
var loadfrm = "<iframe id=\"ifr\" src=\""+ url +"\"></iframe>"
var crfrr = document.getElementById("frm");
crfrr.innerHTML = loadfrm;
}
</script>
</body>
</html>
