<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />

 <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@font-face {
    font-family: 'Minecraft 1.1';
    src: url('/assets/minecraft1.1.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}
body {
background-color: gray;
color: white;
font-family: 'Minecraft 1.1';
}
a {
  background-color: #4CAF50;
  /* Убираем границы блока */
  border: none;
  /* Меняем цвет текста */
  color: white;
  /* Добавляем отступы внутри */
  padding: 15px 32px;
  /* Центрируем текст по центру */
  text-align: center;
  /* Убираем нижнюю черту у тега a */
  text-decoration: none;
  /* Меняем тип на inline-block, чтобы кнопка занимала только столько места, сколько требуется */
  display: inline-block;
  /* Устанавливаем размер текста */
  font-size: 16px;
  /* При наведении курсора на блок будет меняться тип курсора */
  cursor: pointer;
}
</style>
</head>
<body>
<center>
<h1><a href="#" onclick="window.history.back();"><-- Обратно</a></h1>

</html>
